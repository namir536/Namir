<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Намир Групп — Сургалтын систем</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/msal.js/2.38.3/msal-browser.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    text-align: center;
  }
  h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .subtitle { font-size: 14px; color: #666; margin-top: 4px; margin-bottom: 32px; }
  .ms-btn {
    width: 100%;
    padding: 12px 16px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s;
  }
  .ms-btn:hover { background: #006cbd; }
  .ms-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  .loading { display: none; margin-top: 20px; font-size: 14px; color: #666; }
  .error {
    display: none;
    margin-top: 16px;
    padding: 10px 14px;
    background: #fff0f0;
    border: 1px solid #ffcccc;
    border-radius: 8px;
    color: #cc0000;
    font-size: 14px;
    text-align: left;
  }
  .footer { margin-top: 32px; font-size: 12px; color: #999; }
</style>
</head>
<body>
<div class="card">
  <h1>Намир Групп</h1>
  <p class="subtitle">Сургалтын системд нэвтрэх</p>

  <button class="ms-btn" onclick="login()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 21 21">
      <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
      <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
      <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
      <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
    </svg>
    Microsoft акаунтаар нэвтрэх
  </button>

  <div class="loading" id="loading">⏳ Нэвтэрч байна...</div>
  <div class="error" id="error"></div>
  <div class="footer">Намир Групп © 2026</div>
</div>

<script>
const msalConfig = {
  auth: {
    clientId: "5e1907e1-bb7d-4fca-a25e-eae236abd290",
    authority: "https://login.microsoftonline.com/97db511a-8405-4054-8686-b2ee778939d6",
    redirectUri: window.location.href.split('?')[0]
  },
  cache: { cacheLocation: "sessionStorage" }
};

const branchMap = {
  "novatek.mn"       : "engineering",
  "domus.mn"         : "engineering",
  "sigma3.mn"        : "engineering",
  "cablehouse.mn"    : "engineering",
  "numur.mn"         : "financial",
  "leasing.numur.mn" : "financial",
  "drillex.mn"       : "industrial",
  "kemex.mn"         : "industrial",
  "mekhlopat.mn"     : "industrial1",
  "unitedparts.mn"   : "industrial1",
  "kms.mn"           : "industrial1",
  "bavariamotors.mn" : "mobilityandlifestyle",
  "gangantogos.mn"   : "mobilityandlifestyle1",
  "unicom.mn"        : "mobilityandlifestyle2u",
  "ayangastore.mn"   : "mobilityandlifestyle2u",
  "namir.mn"         : "namir",
  "snowball.mn"      : "namir",
  "k2.international" : "namir",
  "snowball.am"      : "namir",
  "blackswan.global" : "namir"
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

async function login() {
  document.getElementById("loading").style.display = "block";
  document.getElementById("error").style.display = "none";
  try {
    const result = await msalInstance.loginPopup({ scopes: ["User.Read"] });
    const email = result.account.username.toLowerCase();
    const domain = email.split("@")[1];
    const branch = branchMap[domain];
    if (branch) {
      window.location.href = "https://" + branch + "-namirgroup.talentlms.com/index/login/sso:1";
    } else {
      document.getElementById("loading").style.display = "none";
      const err = document.getElementById("error");
      err.textContent = "Домэйн танигдсангүй: " + domain + ". Удирдлагатайгаа холбоо барина уу.";
      err.style.display = "block";
    }
  } catch(e) {
    document.getElementById("loading").style.display = "none";
    const err = document.getElementById("error");
    err.textContent = "Нэвтрэхэд алдаа гарлаа. Дахин оролдоно уу.";
    err.style.display = "block";
  }
}

msalInstance.handleRedirectPromise().catch(() => {});
</script>
</body>
</html>
